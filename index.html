<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULUT PLT | Official Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #111625, #161c2e);
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Profil Kısmı */
        .profile-card {
            margin-bottom: 30px;
        }

        .avatar-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #ff0050);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: #000;
        }

        .profile-card h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00f2fe;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .profile-card p {
            font-size: 13px;
            color: #707e94;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Buton Kapsayıcı */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            user-select: none;
        }

        .btn i {
            font-size: 20px;
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }

        /* Sosyal Medya Renkleri */
        .btn-instagram {
            background: rgba(30, 41, 75, 0.6);
            border-left: 5px solid #e1306c;
            color: #e1306c;
        }
        .btn-instagram:hover {
            background: #e1306c;
            color: #fff;
            box-shadow: 0 5px 15px rgba(225, 48, 108, 0.4);
        }

        .btn-tiktok {
            background: rgba(20, 23, 35, 0.7);
            border-left: 5px solid #ff0050;
            color: #fff;
        }
        .btn-tiktok:hover {
            background: #000;
            border-left: 5px solid #00f2fe;
            box-shadow: 0 5px 15px rgba(255, 0, 80, 0.4);
        }

        .btn-spotify {
            background: rgba(18, 48, 38, 0.6);
            border-left: 5px solid #1ed760;
            color: #1ed760;
        }
        .btn-spotify:hover {
            background: #1ed760;
            color: #000;
            box-shadow: 0 5px 15px rgba(30, 215, 96, 0.4);
        }

        /* İletişim Ana Buton */
        .btn-contact-trigger {
            background: rgba(78, 56, 22, 0.6);
            border-left: 5px solid #f39c12;
            color: #f39c12;
        }
        .btn-contact-trigger:hover {
            background: #f39c12;
            color: #fff;
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        /* PC Donanım Ana Buton */
        .btn-setup {
            background: rgba(16, 56, 68, 0.6);
            border-left: 5px solid #00f2fe;
            color: #00f2fe;
        }
        .btn-setup:hover {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        /* Açılır Alt Menüler */
        .hardware-section, .dropdown-menu {
            display: none !important;
            opacity: 0;
            background: rgba(11, 15, 25, 0.6);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 5px;
            margin-bottom: 10px;
            transition: opacity 0.3s ease;
        }

        .hardware-section.show {
            display: block !important;
            opacity: 1;
            text-align: left;
            padding: 20px;
        }

        .dropdown-menu.show {
            display: flex !important;
            flex-direction: column;
            gap: 12px;
            opacity: 1;
        }

        /* Donanım İçerik Kartları */
        .hardware-title {
            font-size: 18px;
            font-weight: 700;
            color: #00f2fe;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .hardware-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .hardware-img-container {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #00f2fe;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            background-color: #111625;
        }

        .hardware-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hardware-info {
            display: flex;
            flex-direction: column;
        }

        .hardware-label {
            font-size: 11px;
            color: #707e94;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .hardware-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        /* İletişim Seçenekleri Renkleri */
        .btn-gmail {
            background: rgba(58, 26, 26, 0.7);
            border-left: 5px solid #ea4335;
            color: #ea4335;
        }
        .btn-gmail:hover {
            background: #ea4335;
            color: #fff;
        }

        .btn-sms {
            background: rgba(26, 47, 75, 0.7);
            border-left: 5px solid #007aff;
            color: #007aff;
        }
        .btn-sms:hover {
            background: #007aff;
            color: #fff;
        }

        .btn-whatsapp {
            background: rgba(20, 56, 36, 0.7);
            border-left: 5px solid #25d366;
            color: #25d366;
        }
        .btn-whatsapp:hover {
            background: #25d366;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-card">
            <div class="avatar-container">
                <img src="./profil.jpg" alt="BULUT PLT">
            </div>
            <h1>BULUT PLT</h1>
            <p>PRO GAMER / OFFICIAL SITE</p>
        </div>

        <div class="links-container">
            
            <a href="https://www.instagram.com/BULUT_PLT_6565" target="_blank" class="btn btn-instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://www.tiktok.com/@bulut._.plt65?_r=1&_t=ZS-96POvcJvdu0" target="_blank" class="btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://open.spotify.com/user/31g7w4gco3zstqct3jymq7m73scq" target="_blank" class="btn btn-spotify">
                <i class="fab fa-spotify"></i> Spotify
            </a>
            
            <div onclick="toggleContact()" class="btn btn-contact-trigger">
                <i class="fas fa-address-book"></i> İletişim
            </div>

            <div id="contactMenu" class="dropdown-menu">
                <a href="mailto:bulutplt65@gmail.com?subject=Siteden%20Mesaj" class="btn btn-gmail">
                    <i class="far fa-envelope"></i> Gmail
                </a>
                <a href="sms:+905050496665?body=Merhaba%20Bulut%20kral!" class="btn btn-sms">
                    <i class="fas fa-comment-sms"></i> SMS
                </a>
                <a href="https://wa.me/905050496665?text=Merhaba%20Bulut%20kral%20siteden%20geliyorum!" target="_blank" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            </div>

            <div onclick="toggleSetup()" class="btn btn-setup">
                <i class="fas fa-desktop"></i> PC Donanım
            </div>

            <div id="setupMenu" class="hardware-section">
                <div class="hardware-title"><i class="fas fa-microchip"></i> Sistem Özellikleri</div>
                
                <div class="hardware-item">
                    <div class="hardware-img-container">
                        <img src="./islemci.png" alt="İşlemci">
                    </div>
                    <div class="hardware-info">
                        <span class="hardware-label">İşlemci</span>
                        <span class="hardware-name">Intel Core i5-10400F</span>
                    </div>
                </div>

                <div class="hardware-item">
                    <div class="hardware-img-container">
                        <img src="./ekrankarti.jpg" alt="Ekran Kartı">
                    </div>
                    <div class="hardware-info">
                        <span class="hardware-label">Ekran Kartı</span>
                        <span class="hardware-name">AMD Radeon RX 580 (8GB)</span>
                    </div>
                </div>

                <div class="hardware-item">
                    <div class="hardware-img-container">
                        <img src="./Kasa.png" alt="Kasa Modeli">
                    </div>
                    <div class="hardware-info">
                        <span class="hardware-label">Kasa Modeli</span>
                        <span class="hardware-name">Izoly Mid-Tower Mesh RGB</span>
                    </div>
                </div>

                <div class="hardware-item">
                    <div class="hardware-img-container">
                        <img src="./ram.jpg" alt="RAM">
                    </div>
                    <div class="hardware-info">
                        <span class="hardware-label">RAM Bellek</span>
                        <span class="hardware-name">16 GB Izoly DDR4 (Kırmızı)</span>
                    </div>
                </div>

                <div class="hardware-item">
                    <div class="hardware-img-container">
                        <img src="./ssd.jpg" alt="Depolama">
                    </div>
                    <div class="hardware-info">
                        <span class="hardware-label">Depolama</span>
                        <span class="hardware-name">512GB M.2 NVMe SSD</span>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        function toggleSetup() {
            var menu = document.getElementById("setupMenu");
            if (menu.style.display === "block" || menu.classList.contains("show")) {
                menu.style.setProperty("display", "none", "important");
                menu.classList.remove("show");
            } else {
                menu.style.setProperty("display", "block", "important");
                menu.classList.add("show");
            }
        }

        function toggleContact() {
            var menu = document.getElementById("contactMenu");
            if (menu.style.display === "flex" || menu.classList.contains("show")) {
                menu.style.setProperty("display", "none", "important");
                menu.classList.remove("show");
            } else {
                menu.style.setProperty("display", "flex", "important");
                menu.classList.add("show");
            }
        }
    </script>

</body>
</html>
